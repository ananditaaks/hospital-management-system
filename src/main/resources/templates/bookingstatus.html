<body>
   <div class="dash">

    <div class="dash-app">
        <header class="dash-toolbar">
            <a href="#!" class="menu-toggle">
                <i class="fas fa-bars"></i>
            </a>
            <h3 style="margin-left: 50px"> View Status</h3>
            <div class="tools">
            
            </div>
        </header>
        <main class="dash-content">
            <div class="container-fluid">
                <div class="card spur-card">
                    <div class="card-header">
                        <div class="spur-card-icon">
                            <i class="fas fa-table"></i>
                        </div>
                        <div class="spur-card-title"> View Status</div>
                    </div>
                    <div class="card-body ">
        <form  th:action="@{/searchstatus}" th:object="${employee}" method="post">
        <div alight="left">
            <tr>
                <label class="form-label" >Booking ID</label>
                <td>
 <input type="number" field="*{id}"  class="form-control" placeholder="Booking ID" />
                </td>
            </tr>
        </div>   
            <br>
            <tr>
            <td colspan="2"><button type="submit" class="btn btn-info">Search</button> </td>
            </tr>
                    
                        <table class="table table-hover table-in-card">
                            <thead>
                            <tr>
                                <th scope="col">Id</th>
                                <th scope="col">Full Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Appointment Date</th>
                                <th scope="col">Message</th>
                                <th scope="col">Status</th>
                               
                            </tr>
                            </thead>
                            <tbody>
                             </tbody>
                        </table>
                        </form>
                    </div>
                </div>
               
            </div>
        </main>
    </div>
</div>
